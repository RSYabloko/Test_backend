<!DOCTYPE html>
<head>
	<meta charset='UTF-8'>
	<title> {{ title }}</title>
</head>

<body>
{% block mainmenu %}
<ul>
	{% for x in menu%}
	<a href="{% url x.url %}">{{x.title}}</a>
	{% endfor %}
</ul>
{% endblock mainmenu %}

{% if messages %}
    {% for message in messages %}
        <p style="color: green;"> {{ message }}</p>
    {% endfor %}
{% endif %}

{% block content %}
{% endblock %}

</body>
